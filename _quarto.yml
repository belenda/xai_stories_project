project:
  type: book
  output-dir: docs

book:
  title: "XAI Stories"
  subtitle: "Casos de Estudio en Inteligencia Artificial Explicable"
  author: "Belén Díaz Agudo y los estudiantes de XAI Curso 2025/26 del máster en IA de la UCM"
  date: today
  date-format: "YYYY"
  repo-url: https://github.com/belenda/xai_stories_project
  repo-actions: [edit, issue]
  sharing: [twitter, linkedin]
  chapters:
    - index.qmd
    - foreword.qmd
    - part: "Nuevos métodos y propuestas"
      chapters:
        - chapters/lime_ga/capitulo.ipynb
        - chapters/adversarios_lime_shap/capitulo.ipynb
    - part: "Imagen médica y señales"
      chapters:
        - chapters/alzheimer/capitulo.ipynb
        - chapters/ecg/capitulo.ipynb
        - chapters/emociones/capitulo.ipynb
    - part: "Series temporales"
      chapters:
        - chapters/triplek/capitulo.ipynb
        - chapters/xrl/capitulo.ipynb
    - part: "Datos tabulares"
      chapters:
        - chapters/admision_ucm/capitulo.ipynb
        - chapters/inversiones/capitulo.ipynb
        - chapters/rotacion_laboral/capitulo.ipynb
        - chapters/sueño/capitulo.ipynb
    - part: "Texto e IA generativa"
      chapters:
        - chapters/toxicidad/capitulo.ipynb
        - chapters/tejedor/capitulo.ipynb
    - part: "Visión por computador"
      chapters:
        - chapters/señales_trafico/capitulo.ipynb
        - chapters/cnn_vae/capitulo.ipynb
    - part: "Sistemas e interfaces"
      chapters:
        - chapters/dashboard/entregable_explicacion.qmd
    - acknowledgements.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-link: true
    highlight-style: github
    fig-width: 8
    fig-height: 5

execute:
  enabled: false
  warning: false
  message: false

lang: es
