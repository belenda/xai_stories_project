project:
  type: book
  output-dir: docs

book:
  title: "XAI Stories"
  subtitle: "Casos de Estudio en Inteligencia Artificial Explicable"
  author: "Belén Díaz Agudo y los estudiantes de XAI Curso 2025/26 del máster en IA de la UCM"
  date: today
  date-format: "YYYY"
  repo-url: https://github.com/belenda/xai-stories
  repo-actions: [edit, issue]
  sharing: [twitter, linkedin]
  chapters:
    - index.qmd
    - foreword.qmd
    - part: "Casos de Estudio"
      chapters:
        - chapters/01-ejemplo.qmd
        # Añadir aquí los capítulos de cada equipo:
        # - chapters/02-nombre-capitulo.qmd
        # - chapters/03-nombre-capitulo.qmd
    - acknowledgements.qmd
    - references.qmd

bibliography: references.bib
# csl: apa.csl  # Descomentar si se añade un archivo .csl personalizado

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-link: true
    highlight-style: github
    fig-width: 8
    fig-height: 5

execute:
  freeze: auto
  eval: false
  warning: false
  message: false

lang: es
